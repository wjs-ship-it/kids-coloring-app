<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="manifest" href="./manifest.json">
<title>키즈 컬러링</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-user-select:none;user-select:none}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Noto Sans KR',sans-serif;background:#fff}
canvas{touch-action:none}
button{touch-action:manipulation;border:none;cursor:pointer;-webkit-tap-highlight-color:transparent}
.screen{display:none;width:100%;height:100%;position:absolute;inset:0}
.screen.active{display:flex;flex-direction:column;align-items:center;justify-content:center}

/* Upload */
#upload-screen{background:linear-gradient(160deg,#43e97b 0%,#38f9d7 50%,#667eea 100%);gap:28px}
.app-title{font-size:42px;font-weight:900;color:#fff;text-shadow:3px 3px 0 rgba(0,0,0,0.1);text-align:center}
.upload-btn-big{width:180px;height:180px;border-radius:50%;background:#fff;box-shadow:0 8px 30px rgba(0,0,0,0.15);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;transition:transform .2s}
.upload-btn-big:active{transform:scale(.9)}
.upload-btn-big .icon{font-size:72px}
.upload-btn-big .label{font-size:16px;font-weight:700;color:#667eea}
.demo-pill{padding:16px 36px;border-radius:50px;background:rgba(255,255,255,.3);color:#fff;font-size:17px;font-weight:700}
.demo-pill:active{transform:scale(.92)}
#photo-input{display:none}
.deco{position:absolute;font-size:48px;opacity:.25;animation:float 4s ease-in-out infinite;pointer-events:none}
.deco:nth-child(1){top:8%;left:8%}.deco:nth-child(2){top:12%;right:10%;animation-delay:1s}
.deco:nth-child(3){bottom:18%;left:12%;animation-delay:2s}.deco:nth-child(4){bottom:10%;right:8%;animation-delay:.5s}
@keyframes float{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-12px) rotate(8deg)}}

/* Processing */
#processing-screen{background:#f0f4ff;gap:24px}
.loading-anim{font-size:80px;animation:bounce .6s ease-in-out infinite alternate}
@keyframes bounce{from{transform:scale(1)}to{transform:scale(1.2)}}
.loading-text{font-size:22px;font-weight:700;color:#667eea}

/* Preview */
#preview-screen{background:#f8f9ff;gap:20px;padding:24px}
.preview-box{display:flex;gap:12px;align-items:center;background:#fff;padding:16px;border-radius:24px;box-shadow:0 4px 20px rgba(0,0,0,.06)}
.preview-box img,.preview-box canvas{width:120px;height:120px;object-fit:contain;border-radius:16px}
.preview-arrow{font-size:36px;color:#667eea}
.start-btn{width:200px;height:200px;border-radius:50%;background:linear-gradient(135deg,#fbbf24,#f97316);color:#fff;font-size:36px;font-weight:900;box-shadow:0 8px 30px rgba(249,115,22,.3);transition:transform .2s;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:4px}
.start-btn:active{transform:scale(.9)}
.start-btn .si{font-size:64px}

/* Canvas screen */
#canvas-screen{position:relative;display:none!important}
#canvas-screen.active{display:block!important}
#drawing-canvas{display:block;position:absolute;top:0;left:0}

/* Round buttons */
.round-btn{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:26px;box-shadow:0 3px 12px rgba(0,0,0,.12);transition:transform .15s;position:absolute;z-index:50}
.round-btn:active{transform:scale(.85)}
#btn-back{top:14px;left:14px;background:#fee2e2}
#btn-undo{top:14px;left:76px;background:#e0e7ff}
#btn-save{top:14px;right:14px;background:#d1fae5}

/* Progress bar */
.progress-wrap{position:absolute;top:76px;left:14px;right:14px;z-index:50;display:flex;align-items:center;gap:8px}
.progress-bar{flex:1;height:14px;background:#e2e8f0;border-radius:7px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#fbbf24,#f97316);border-radius:7px;transition:width .3s;width:0}
.part-label{font-size:14px;font-weight:800;color:#667eea;white-space:nowrap}

/* Side palette */
.side-palette{position:absolute;right:8px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:7px;z-index:50;background:rgba(255,255,255,.88);backdrop-filter:blur(8px);padding:8px 6px;border-radius:28px;box-shadow:0 4px 20px rgba(0,0,0,.08);max-height:65vh;overflow-y:auto;scrollbar-width:none;transition:opacity .3s,transform .3s}
.side-palette::-webkit-scrollbar{display:none}
.side-palette.hidden{opacity:0;transform:translateY(-50%) translateX(80px);pointer-events:none}
.cdot{width:40px;height:40px;min-height:40px;border-radius:50%;border:3px solid transparent;transition:all .15s;flex-shrink:0}
.cdot.active{border-color:#1e293b;transform:scale(1.15)}
.eraser-dot{width:40px;height:40px;min-height:40px;border-radius:50%;background:#fff;border:3px solid #e2e8f0;display:flex;align-items:center;justify-content:center;font-size:20px;transition:all .15s;flex-shrink:0}
.eraser-dot.active{border-color:#1e293b;transform:scale(1.15)}

/* Brush bar */
.brush-bar{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);display:flex;gap:10px;z-index:50;background:rgba(255,255,255,.9);backdrop-filter:blur(8px);padding:8px 16px;border-radius:24px;box-shadow:0 4px 16px rgba(0,0,0,.08);transition:opacity .3s,transform .3s}
.brush-bar.hidden{opacity:0;transform:translateX(-50%) translateY(60px);pointer-events:none}
.brush-pick{width:44px;height:44px;border-radius:50%;background:#f1f5f9;display:flex;align-items:center;justify-content:center;transition:all .15s}
.brush-pick:active{transform:scale(.9)}
.brush-pick.active{background:#e0e7ff;box-shadow:inset 0 0 0 3px #667eea}
.bdot{border-radius:50%;background:#1e293b}

/* Hint toast */
.hint-toast{position:absolute;top:100px;left:50%;transform:translateX(-50%);background:#fbbf24;color:#78350f;padding:10px 24px;border-radius:24px;font-size:15px;font-weight:700;z-index:60;pointer-events:none;white-space:nowrap;transition:opacity .5s;animation:hint-pulse 2s infinite}
@keyframes hint-pulse{0%,100%{opacity:1;transform:translateX(-50%) scale(1)}50%{opacity:.7;transform:translateX(-50%) scale(.96)}}

/* Part complete overlay */
.part-done-overlay{position:fixed;inset:0;z-index:200;display:none;align-items:center;justify-content:center;pointer-events:none}
.part-done-overlay.active{display:flex}
.part-done-msg{font-size:48px;font-weight:900;color:#fff;text-shadow:3px 3px 0 rgba(0,0,0,.2);animation:pop-in .5s ease-out}
@keyframes pop-in{0%{transform:scale(0) rotate(-20deg);opacity:0}60%{transform:scale(1.2) rotate(5deg)}100%{transform:scale(1) rotate(0deg);opacity:1}}

/* Stars celebration */
.stars-celebration{position:fixed;inset:0;z-index:300;pointer-events:none;display:none}
.stars-celebration.active{display:block}
.star-particle{position:absolute;animation:star-fall 1.5s ease-out forwards}
@keyframes star-fall{0%{opacity:1;transform:translateY(0) rotate(0deg) scale(1)}100%{opacity:0;transform:translateY(60vh) rotate(360deg) scale(.3)}}

/* Save toast */
.save-toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:#065f46;color:#fff;padding:14px 28px;border-radius:20px;font-size:18px;font-weight:700;z-index:200;display:none}

/* Mode selection */
#mode-screen{background:linear-gradient(160deg,#667eea 0%,#764ba2 100%);gap:20px;padding:24px}
.mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;max-width:340px;width:100%}
.mode-card{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;padding:20px 12px;border-radius:24px;background:rgba(255,255,255,.92);box-shadow:0 4px 20px rgba(0,0,0,.08);transition:transform .15s}
.mode-card:active{transform:scale(.9)}
.mode-card .mode-icon{font-size:44px}
.mode-card .mode-name{font-size:14px;font-weight:800;color:#4c1d95;text-align:center}
.mode-card.full-width{grid-column:1/-1}
.mode-back{padding:12px 28px;border-radius:50px;background:rgba(255,255,255,.25);color:#fff;font-size:15px;font-weight:700;margin-top:8px}
.mode-back:active{transform:scale(.92)}

/* Preset selection */
#preset-screen{background:linear-gradient(160deg,#fbbf24 0%,#f97316 100%);gap:16px;padding:24px}
.preset-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;max-width:320px;width:100%}
.preset-card{display:flex;flex-direction:column;align-items:center;gap:6px;padding:16px 10px;border-radius:20px;background:rgba(255,255,255,.92);box-shadow:0 4px 16px rgba(0,0,0,.08);transition:transform .15s}
.preset-card:active{transform:scale(.9)}
.preset-card .preset-emoji{font-size:42px}
.preset-card .preset-name{font-size:13px;font-weight:800;color:#78350f}
</style>
</head>
<body>

<div id="upload-screen" class="screen active">
  <div class="deco">🖍️</div><div class="deco">🎨</div><div class="deco">⭐</div><div class="deco">🌈</div>
  <div class="app-title">사진을 그림으로!<br>🎨</div>
  <button class="upload-btn-big" id="btn-upload">
    <span class="icon">📸</span><span class="label">사진 고르기</span>
  </button>
  <input type="file" id="photo-input" accept="image/*" capture="environment">
  <button class="demo-pill" id="btn-demo">🐱 체험해보기</button>
  <button class="demo-pill" id="btn-presets" style="background:rgba(255,255,255,.5);color:#78350f">🖼️ 그림 고르기</button>
  <button class="demo-pill" id="btn-creative" style="background:rgba(255,255,255,.3);color:#4c1d95">✨ 자유롭게 놀기</button>
</div>

<div id="preset-screen" class="screen">
  <div class="app-title" style="color:#fff;font-size:28px">그림을 골라봐! 🖼️</div>
  <div class="preset-grid" id="preset-grid"></div>
  <button class="mode-back" id="btn-preset-back">↩️ 돌아가기</button>
</div>

<div id="processing-screen" class="screen">
  <div class="loading-anim">🖍️</div>
  <div class="loading-text" id="loading-text">그림으로 바꾸는 중...</div>
</div>

<div id="preview-screen" class="screen">
  <div class="preview-box">
    <img id="preview-img"><div class="preview-arrow">→</div><canvas id="lineart-preview"></canvas>
  </div>
  <button class="start-btn" id="btn-begin"><span class="si">▶️</span>시작!</button>
  <button class="demo-pill" id="btn-other-photo" style="background:rgba(100,100,200,.15);color:#667eea">↩️ 다른 사진</button>
</div>

<div id="mode-screen" class="screen">
  <div class="app-title" style="color:#fff;font-size:32px">어떻게 놀까?</div>
  <div class="mode-grid">
    <button class="mode-card" data-mode="trace"><span class="mode-icon">✏️</span><span class="mode-name">따라 그리기</span></button>
    <button class="mode-card" data-mode="color"><span class="mode-icon">🎨</span><span class="mode-name">색칠하기</span></button>
    <button class="mode-card" data-mode="sketch"><span class="mode-icon">🖍️</span><span class="mode-name">자유 그리기</span></button>
    <button class="mode-card" data-mode="kaleidoscope"><span class="mode-icon">🔮</span><span class="mode-name">만화경</span></button>
    <button class="mode-card full-width" data-mode="neon"><span class="mode-icon">✨</span><span class="mode-name">네온 매직</span></button>
  </div>
  <button class="mode-back" id="btn-mode-back">↩️ 돌아가기</button>
</div>

<div id="canvas-screen" class="screen">
  <canvas id="drawing-canvas"></canvas>
  <button class="round-btn" id="btn-back">↩️</button>
  <button class="round-btn" id="btn-undo">⬅️</button>
  <button class="round-btn" id="btn-save">💾</button>
  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    <div class="part-label" id="part-label"></div>
  </div>
  <div class="side-palette hidden" id="side-palette"></div>
  <div class="brush-bar hidden" id="brush-bar"></div>
  <div class="hint-toast" id="hint-toast" style="display:none;"></div>
</div>

<div class="part-done-overlay" id="part-done-overlay"><div class="part-done-msg" id="part-done-msg"></div></div>
<div class="stars-celebration" id="stars-celebration"></div>
<div class="save-toast" id="save-toast">💾 저장 완료!</div>

<script type="module" src="./js/app.js"></script>
<script>if('serviceWorker' in navigator)navigator.serviceWorker.register('./sw.js',{scope:'./'});</script>
</body>
</html>
