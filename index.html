<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>키즈 컬러링</title>
<link rel="manifest" href="manifest.json">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-user-select: none; user-select: none; }
html, body { width: 100%; height: 100%; overflow: hidden; font-family: 'Noto Sans KR', sans-serif; background: #fff; }
canvas { touch-action: none; }
button { touch-action: manipulation; border: none; cursor: pointer; -webkit-tap-highlight-color: transparent; }

.screen { display: none; width: 100%; height: 100%; position: absolute; inset: 0; }
.screen.active { display: block; }

/* ===== UPLOAD SCREEN ===== */
#upload-screen {
  background: linear-gradient(160deg, #43e97b 0%, #38f9d7 50%, #667eea 100%);
  display: none; flex-direction: column; align-items: center; justify-content: center; gap: 28px;
}
#upload-screen.active { display: flex; }

.app-title {
  font-size: 42px; font-weight: 900; color: #fff;
  text-shadow: 3px 3px 0 rgba(0,0,0,0.1);
  text-align: center; line-height: 1.3;
}
.app-subtitle { font-size: 18px; color: rgba(255,255,255,0.85); text-align: center; }

.upload-btn-big {
  width: 180px; height: 180px; border-radius: 50%;
  background: #fff; box-shadow: 0 8px 30px rgba(0,0,0,0.15);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 8px; transition: transform 0.2s;
}
.upload-btn-big:active { transform: scale(0.9); }
.upload-btn-big .icon { font-size: 72px; line-height: 1; }
.upload-btn-big .label { font-size: 16px; font-weight: 700; color: #667eea; }

.demo-pill {
  padding: 16px 36px; border-radius: 50px;
  background: rgba(255,255,255,0.3); backdrop-filter: blur(8px);
  color: #fff; font-size: 17px; font-weight: 700;
  transition: transform 0.2s;
}
.demo-pill:active { transform: scale(0.92); }
#photo-input { display: none; }

/* Floating decorations */
.deco { position: absolute; font-size: 48px; opacity: 0.25; animation: float 4s ease-in-out infinite; pointer-events: none; }
.deco:nth-child(1) { top: 8%; left: 8%; animation-delay: 0s; }
.deco:nth-child(2) { top: 12%; right: 10%; animation-delay: 1s; }
.deco:nth-child(3) { bottom: 18%; left: 12%; animation-delay: 2s; }
.deco:nth-child(4) { bottom: 10%; right: 8%; animation-delay: 0.5s; }
@keyframes float {
  0%,100% { transform: translateY(0) rotate(0deg); }
  50% { transform: translateY(-12px) rotate(8deg); }
}

/* ===== PROCESSING ===== */
#processing-screen { display: none; align-items: center; justify-content: center; flex-direction: column; gap: 24px; background: #f0f4ff; }
#processing-screen.active { display: flex; }
.loading-anim { font-size: 80px; animation: bounce 0.6s ease-in-out infinite alternate; }
@keyframes bounce { from { transform: scale(1); } to { transform: scale(1.2); } }
.loading-text { font-size: 22px; font-weight: 700; color: #667eea; }

/* ===== MODE SELECT ===== */
#mode-screen { display: none; flex-direction: column; align-items: center; justify-content: center; gap: 20px; background: #f8f9ff; padding: 24px; }
#mode-screen.active { display: flex; }

.preview-box {
  display: flex; gap: 12px; align-items: center;
  background: #fff; padding: 16px; border-radius: 24px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.06);
}
.preview-box img, .preview-box canvas { width: 120px; height: 120px; object-fit: contain; border-radius: 16px; }
.preview-arrow { font-size: 36px; color: #667eea; }

.mode-card {
  width: 280px; padding: 24px; border-radius: 28px;
  display: flex; align-items: center; gap: 16px;
  font-size: 22px; font-weight: 800;
  box-shadow: 0 6px 20px rgba(0,0,0,0.08);
  transition: transform 0.2s;
}
.mode-card:active { transform: scale(0.94); }
.mode-card .card-icon { font-size: 44px; }
.mode-trace-card { background: #fff3cd; color: #7c5e10; }
.mode-color-card { background: #d1fae5; color: #065f46; }

.back-circle {
  width: 56px; height: 56px; border-radius: 50%;
  background: #e8eaff; font-size: 28px;
  display: flex; align-items: center; justify-content: center;
  margin-top: 8px; transition: transform 0.2s;
}
.back-circle:active { transform: scale(0.9); }

/* ===== CANVAS SCREEN ===== */
#canvas-screen { position: relative; }
#drawing-canvas { display: block; position: absolute; top: 0; left: 0; }

/* Round icon buttons — kid-friendly */
.round-btn {
  width: 56px; height: 56px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 28px; box-shadow: 0 3px 12px rgba(0,0,0,0.12);
  transition: transform 0.15s; position: absolute; z-index: 50;
}
.round-btn:active { transform: scale(0.85); }

#btn-go-back { top: 16px; left: 16px; background: #fee2e2; }
#btn-undo { top: 16px; left: 82px; background: #e0e7ff; }
#btn-clear { top: 16px; right: 82px; background: #fef3c7; }
#btn-save { top: 16px; right: 16px; background: #d1fae5; }

/* Color palette — vertical right side, big circles */
.side-palette {
  position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
  display: flex; flex-direction: column; gap: 8px; z-index: 50;
  background: rgba(255,255,255,0.85); backdrop-filter: blur(8px);
  padding: 10px 8px; border-radius: 32px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.08);
  max-height: 70vh; overflow-y: auto;
  scrollbar-width: none;
}
.side-palette::-webkit-scrollbar { display: none; }

.cdot {
  width: 44px; height: 44px; min-height: 44px; border-radius: 50%;
  border: 4px solid transparent; transition: all 0.15s;
  flex-shrink: 0;
}
.cdot.active { border-color: #1e293b; transform: scale(1.15); box-shadow: 0 0 0 3px rgba(30,41,59,0.2); }

/* Eraser in palette */
.eraser-dot {
  width: 44px; height: 44px; min-height: 44px; border-radius: 50%;
  background: #fff; border: 4px solid #e2e8f0;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; transition: all 0.15s; flex-shrink: 0;
}
.eraser-dot.active { border-color: #1e293b; transform: scale(1.15); box-shadow: 0 0 0 3px rgba(30,41,59,0.2); }

/* Brush size selector — bottom center */
.brush-bar {
  position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
  display: flex; gap: 12px; z-index: 50;
  background: rgba(255,255,255,0.9); backdrop-filter: blur(8px);
  padding: 10px 20px; border-radius: 28px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.08);
}
.brush-pick {
  width: 48px; height: 48px; border-radius: 50%;
  background: #f1f5f9; display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}
.brush-pick:active { transform: scale(0.9); }
.brush-pick.active { background: #e0e7ff; box-shadow: inset 0 0 0 3px #667eea; }
.bdot { border-radius: 50%; background: #1e293b; }

/* Trace hint */
.trace-hint {
  position: absolute; top: 80px; left: 50%; transform: translateX(-50%);
  background: #fbbf24; color: #78350f; padding: 10px 24px;
  border-radius: 24px; font-size: 16px; font-weight: 700;
  z-index: 60; pointer-events: none;
  animation: hint-pulse 2s infinite; white-space: nowrap;
}
@keyframes hint-pulse { 0%,100% { opacity: 1; transform: translateX(-50%) scale(1); } 50% { opacity: 0.7; transform: translateX(-50%) scale(0.96); } }

/* Save toast */
.save-toast {
  position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
  background: #065f46; color: #fff; padding: 14px 28px;
  border-radius: 20px; font-size: 18px; font-weight: 700;
  z-index: 200; display: none; animation: toast-in 0.3s ease-out;
}
@keyframes toast-in { from { opacity: 0; transform: translateX(-50%) translateY(20px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }

/* Stars celebration */
.stars-celebration {
  position: fixed; inset: 0; z-index: 300; pointer-events: none; display: none;
}
.stars-celebration.active { display: block; }
.star-particle {
  position: absolute; font-size: 36px;
  animation: star-fall 1.5s ease-out forwards;
}
@keyframes star-fall {
  0% { opacity: 1; transform: translateY(0) rotate(0deg) scale(1); }
  100% { opacity: 0; transform: translateY(60vh) rotate(360deg) scale(0.3); }
}
</style>
</head>
<body>

<!-- UPLOAD -->
<div id="upload-screen" class="screen active">
  <div class="deco">🖍️</div>
  <div class="deco">🎨</div>
  <div class="deco">⭐</div>
  <div class="deco">🌈</div>
  <div class="app-title">사진을 그림으로!<br>🎨</div>
  <button class="upload-btn-big" onclick="document.getElementById('photo-input').click()">
    <span class="icon">📸</span>
    <span class="label">사진 고르기</span>
  </button>
  <input type="file" id="photo-input" accept="image/*" capture="environment">
  <button class="demo-pill" onclick="loadDemoImage()">🐱 체험해보기</button>
</div>

<!-- PROCESSING -->
<div id="processing-screen" class="screen">
  <div class="loading-anim">🖍️</div>
  <div class="loading-text">그림으로 바꾸는 중...</div>
</div>

<!-- MODE SELECT -->
<div id="mode-screen" class="screen">
  <div class="preview-box">
    <img id="preview-img">
    <div class="preview-arrow">→</div>
    <canvas id="lineart-preview"></canvas>
  </div>
  <button class="mode-card mode-trace-card" onclick="startTrace()">
    <span class="card-icon">✏️</span> 따라 그리기
  </button>
  <button class="mode-card mode-color-card" onclick="startColor()">
    <span class="card-icon">🎨</span> 색칠하기
  </button>
  <button class="back-circle" onclick="goHome()">↩️</button>
</div>

<!-- CANVAS -->
<div id="canvas-screen" class="screen">
  <canvas id="drawing-canvas"></canvas>

  <!-- Top buttons — big round icons, no text -->
  <button class="round-btn" id="btn-go-back" onclick="goToModeSelect()">↩️</button>
  <button class="round-btn" id="btn-undo" onclick="undo()">⬅️</button>
  <button class="round-btn" id="btn-clear" onclick="clearDrawing()">🗑️</button>
  <button class="round-btn" id="btn-save" onclick="saveImage()">💾</button>

  <!-- Right side color palette — vertical, big dots -->
  <div class="side-palette" id="side-palette"></div>

  <!-- Bottom brush sizes -->
  <div class="brush-bar" id="brush-bar"></div>

  <!-- Trace hint -->
  <div class="trace-hint" id="trace-hint" style="display:none;">점선을 따라 그려봐요! ✏️</div>
</div>

<!-- Save toast -->
<div class="save-toast" id="save-toast">💾 저장 완료!</div>

<!-- Star celebration -->
<div class="stars-celebration" id="stars-celebration"></div>

<!-- Hidden processing canvases -->
<canvas id="source-canvas" style="display:none;"></canvas>
<canvas id="lineart-canvas" style="display:none;"></canvas>

<script>
const COLORS = [
  '#ef4444','#f97316','#facc15','#22c55e','#06b6d4',
  '#3b82f6','#8b5cf6','#ec4899','#a16207','#1e293b',
  '#fef3c7','#bbf7d0','#bae6fd','#e9d5ff','#fecdd3'
];
const BRUSH_SIZES = [
  { size: 4, dot: 8, label: 'S' },
  { size: 10, dot: 14, label: 'M' },
  { size: 22, dot: 22, label: 'L' },
];

let currentMode = 'trace';
let currentColor = '#ef4444';
let brushSize = 10;
let isEraser = false;
let isDrawing = false;
let historyStack = [];
let lineartImageData = null;
let sourceImage = null;
let canvasOffsetX = 0, canvasOffsetY = 0;

const photoInput = document.getElementById('photo-input');
const drawingCanvas = document.getElementById('drawing-canvas');
const ctx = drawingCanvas.getContext('2d');
const sourceCanvas = document.getElementById('source-canvas');
const sourceCtx = sourceCanvas.getContext('2d');
const lineartCanvas = document.getElementById('lineart-canvas');
const lineartCtx = lineartCanvas.getContext('2d');

// Build side palette
(function buildPalette() {
  const pal = document.getElementById('side-palette');
  COLORS.forEach((c, i) => {
    const d = document.createElement('button');
    d.className = 'cdot' + (i === 0 ? ' active' : '');
    d.style.background = c;
    d.onclick = () => pickColor(c, d);
    pal.appendChild(d);
  });
  const eraser = document.createElement('button');
  eraser.className = 'eraser-dot';
  eraser.id = 'eraser-btn';
  eraser.textContent = '🧹';
  eraser.onclick = toggleEraser;
  pal.appendChild(eraser);
})();

// Build brush bar
(function buildBrushBar() {
  const bar = document.getElementById('brush-bar');
  BRUSH_SIZES.forEach((b, i) => {
    const btn = document.createElement('button');
    btn.className = 'brush-pick' + (i === 1 ? ' active' : '');
    const dot = document.createElement('div');
    dot.className = 'bdot';
    dot.style.width = b.dot + 'px';
    dot.style.height = b.dot + 'px';
    btn.appendChild(dot);
    btn.onclick = () => {
      brushSize = b.size;
      document.querySelectorAll('.brush-pick').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
    };
    bar.appendChild(btn);
  });
})();

function pickColor(color, el) {
  currentColor = color;
  isEraser = false;
  document.getElementById('eraser-btn').classList.remove('active');
  document.querySelectorAll('.cdot').forEach(d => d.classList.remove('active'));
  el.classList.add('active');
}

function toggleEraser() {
  isEraser = !isEraser;
  const btn = document.getElementById('eraser-btn');
  btn.classList.toggle('active', isEraser);
  if (isEraser) document.querySelectorAll('.cdot').forEach(d => d.classList.remove('active'));
}

// Screen management
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function goHome() {
  showScreen('upload-screen');
  photoInput.value = '';
}
function goToModeSelect() { showScreen('mode-screen'); }

// Photo handling
photoInput.addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  showScreen('processing-screen');
  const reader = new FileReader();
  reader.onload = (ev) => {
    const img = new Image();
    img.onload = () => { sourceImage = img; setTimeout(() => convertToLineart(img), 400); };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
});

function loadDemoImage() {
  showScreen('processing-screen');
  const c = document.createElement('canvas');
  c.width = 400; c.height = 400;
  const g = c.getContext('2d');
  g.fillStyle = '#87CEEB'; g.fillRect(0,0,400,400);
  g.fillStyle = '#FFA500';
  g.beginPath(); g.ellipse(200,260,120,140,0,0,Math.PI*2); g.fill();
  g.beginPath(); g.arc(200,150,90,0,Math.PI*2); g.fill();
  g.beginPath(); g.moveTo(130,80); g.lineTo(110,20); g.lineTo(160,60); g.fill();
  g.beginPath(); g.moveTo(270,80); g.lineTo(290,20); g.lineTo(240,60); g.fill();
  g.fillStyle='#fff';
  g.beginPath(); g.arc(170,140,20,0,Math.PI*2); g.fill();
  g.beginPath(); g.arc(230,140,20,0,Math.PI*2); g.fill();
  g.fillStyle='#333';
  g.beginPath(); g.arc(175,142,10,0,Math.PI*2); g.fill();
  g.beginPath(); g.arc(235,142,10,0,Math.PI*2); g.fill();
  g.fillStyle='#FF69B4';
  g.beginPath(); g.moveTo(200,165); g.lineTo(193,175); g.lineTo(207,175); g.fill();
  g.strokeStyle='#333'; g.lineWidth=2;
  g.beginPath(); g.moveTo(200,175); g.lineTo(200,185);
  g.moveTo(200,185); g.quadraticCurveTo(185,195,175,185);
  g.moveTo(200,185); g.quadraticCurveTo(215,195,225,185); g.stroke();
  g.beginPath();
  g.moveTo(120,160); g.lineTo(165,170); g.moveTo(120,180); g.lineTo(165,178);
  g.moveTo(235,170); g.lineTo(280,160); g.moveTo(235,178); g.lineTo(280,180); g.stroke();
  const img = new Image();
  img.onload = () => { sourceImage = img; setTimeout(() => convertToLineart(img), 400); };
  img.src = c.toDataURL();
}

// Edge detection
function convertToLineart(img) {
  const MAX = 600;
  let w = img.width, h = img.height;
  if (w > MAX || h > MAX) {
    const r = Math.min(MAX/w, MAX/h);
    w = Math.floor(w*r); h = Math.floor(h*r);
  }
  sourceCanvas.width = w; sourceCanvas.height = h;
  sourceCtx.drawImage(img, 0, 0, w, h);
  const id = sourceCtx.getImageData(0, 0, w, h);
  const px = id.data;
  const gray = new Float32Array(w*h);
  for (let i = 0; i < w*h; i++) { const j=i*4; gray[i] = 0.299*px[j]+0.587*px[j+1]+0.114*px[j+2]; }

  const blur = new Float32Array(w*h);
  const k = [1,2,1,2,4,2,1,2,1];
  for (let y=1;y<h-1;y++) for (let x=1;x<w-1;x++) {
    let s=0;
    for (let ky=-1;ky<=1;ky++) for (let kx=-1;kx<=1;kx++) s += gray[(y+ky)*w+(x+kx)]*k[(ky+1)*3+(kx+1)];
    blur[y*w+x] = s/16;
  }

  const edges = new Float32Array(w*h);
  const sx=[-1,0,1,-2,0,2,-1,0,1], sy=[-1,-2,-1,0,0,0,1,2,1];
  let mx = 0;
  for (let y=1;y<h-1;y++) for (let x=1;x<w-1;x++) {
    let gx=0,gy=0;
    for (let ky=-1;ky<=1;ky++) for (let kx=-1;kx<=1;kx++) {
      const v=blur[(y+ky)*w+(x+kx)], ki=(ky+1)*3+(kx+1);
      gx+=v*sx[ki]; gy+=v*sy[ki];
    }
    const m=Math.sqrt(gx*gx+gy*gy); edges[y*w+x]=m; if(m>mx) mx=m;
  }

  lineartCanvas.width=w; lineartCanvas.height=h;
  const od=lineartCtx.createImageData(w,h), o=od.data;
  const th=mx*0.15;
  for (let i=0;i<w*h;i++) { const v=edges[i]>th?40:255; o[i*4]=v; o[i*4+1]=v; o[i*4+2]=v; o[i*4+3]=255; }
  lineartCtx.putImageData(od,0,0);

  const td=lineartCtx.getImageData(0,0,w,h), t=new Uint8ClampedArray(td.data);
  for (let y=1;y<h-1;y++) for (let x=1;x<w-1;x++) {
    if (od.data[(y*w+x)*4]<128) {
      for (let dy=-1;dy<=1;dy++) for (let dx=-1;dx<=1;dx++) {
        const ni=((y+dy)*w+(x+dx))*4; t[ni]=40; t[ni+1]=40; t[ni+2]=40;
      }
    }
  }
  td.data.set(t); lineartCtx.putImageData(td,0,0);
  lineartImageData = lineartCtx.getImageData(0,0,w,h);

  document.getElementById('preview-img').src = sourceCanvas.toDataURL();
  const lp = document.getElementById('lineart-preview');
  lp.width=w; lp.height=h; lp.getContext('2d').putImageData(lineartImageData,0,0);
  showScreen('mode-screen');
}

// Setup canvas
function setupCanvas() {
  drawingCanvas.width = window.innerWidth;
  drawingCanvas.height = window.innerHeight;
  ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  historyStack = [];
  showScreen('canvas-screen');
}

function startTrace() {
  currentMode = 'trace';
  document.getElementById('trace-hint').style.display = 'block';
  setupCanvas();
  const w=lineartCanvas.width, h=lineartCanvas.height;
  ctx.fillStyle='#fff'; ctx.fillRect(0,0,drawingCanvas.width,drawingCanvas.height);
  canvasOffsetX = Math.floor((drawingCanvas.width - w)/2);
  canvasOffsetY = Math.floor((drawingCanvas.height - h)/2);

  const ld = lineartImageData.data;
  ctx.fillStyle = 'rgba(170,170,210,0.35)';
  for (let y=0;y<h;y+=3) for (let x=0;x<w;x+=3) {
    if (ld[(y*w+x)*4]<128 && (x+y)%8<5)
      ctx.fillRect(canvasOffsetX+x, canvasOffsetY+y, 3, 3);
  }
  saveState();
  brushSize = 6;
  currentColor = '#1e293b';
  isEraser = false;
  syncPaletteUI();
}

function startColor() {
  currentMode = 'color';
  document.getElementById('trace-hint').style.display = 'none';
  setupCanvas();
  const w=lineartCanvas.width, h=lineartCanvas.height;
  ctx.fillStyle='#fff'; ctx.fillRect(0,0,drawingCanvas.width,drawingCanvas.height);
  canvasOffsetX = Math.floor((drawingCanvas.width - w)/2);
  canvasOffsetY = Math.floor((drawingCanvas.height - h)/2);

  const ld = lineartImageData.data;
  ctx.fillStyle = '#1e293b';
  for (let y=0;y<h;y++) for (let x=0;x<w;x++) {
    if (ld[(y*w+x)*4]<128) ctx.fillRect(canvasOffsetX+x, canvasOffsetY+y, 1, 1);
  }
  saveState();
  brushSize = 10;
  currentColor = '#ef4444';
  isEraser = false;
  syncPaletteUI();
}

function syncPaletteUI() {
  document.getElementById('eraser-btn').classList.remove('active');
  document.querySelectorAll('.cdot').forEach(d => d.classList.remove('active'));
  if (!isEraser) {
    const dots = document.querySelectorAll('.cdot');
    const idx = COLORS.indexOf(currentColor);
    if (idx >= 0 && dots[idx]) dots[idx].classList.add('active');
  }
}

// Drawing
let lastX=0, lastY=0;
function getPos(e) {
  const r = drawingCanvas.getBoundingClientRect();
  const t = e.touches ? e.touches[0] : e;
  return { x: t.clientX - r.left, y: t.clientY - r.top };
}

drawingCanvas.addEventListener('touchstart', onStart, {passive:false});
drawingCanvas.addEventListener('mousedown', onStart);
drawingCanvas.addEventListener('touchmove', onMove, {passive:false});
drawingCanvas.addEventListener('mousemove', onMove);
drawingCanvas.addEventListener('touchend', onEnd);
drawingCanvas.addEventListener('mouseup', onEnd);
drawingCanvas.addEventListener('mouseleave', onEnd);

function onStart(e) {
  e.preventDefault();
  if (currentMode==='color' && !isEraser) {
    const p = getPos(e);
    floodFill(Math.floor(p.x), Math.floor(p.y), currentColor);
    saveState();
    return;
  }
  isDrawing = true;
  const p = getPos(e);
  lastX = p.x; lastY = p.y;
}

function onMove(e) {
  e.preventDefault();
  if (!isDrawing) return;
  const p = getPos(e);
  ctx.globalCompositeOperation = 'source-over';
  ctx.strokeStyle = isEraser ? '#ffffff' : currentColor;
  ctx.lineWidth = isEraser ? brushSize*3 : brushSize;
  ctx.beginPath(); ctx.moveTo(lastX,lastY); ctx.lineTo(p.x,p.y); ctx.stroke();
  lastX=p.x; lastY=p.y;
}

function onEnd() {
  if (!isDrawing) return;
  isDrawing = false;
  saveState();
}

// Flood fill
function floodFill(sx, sy, fc) {
  const w=drawingCanvas.width, h=drawingCanvas.height;
  const id=ctx.getImageData(0,0,w,h), d=id.data;
  if (sx<0||sx>=w||sy<0||sy>=h) return;
  const si=(sy*w+sx)*4, sr=d[si], sg=d[si+1], sb=d[si+2];
  const c = hexRgb(fc); if(!c) return;
  if (Math.abs(sr-c.r)<10 && Math.abs(sg-c.g)<10 && Math.abs(sb-c.b)<10) return;
  if (sr<60 && sg<60 && sb<60) return;
  const tol=40, stk=[[sx,sy]], vis=new Uint8Array(w*h);
  let cnt=0; const mx=w*h*0.5;
  while (stk.length>0 && cnt<mx) {
    const [x,y]=stk.pop(), pos=y*w+x;
    if (x<0||x>=w||y<0||y>=h||vis[pos]) continue;
    const i=pos*4;
    if (!(Math.abs(d[i]-sr)<tol && Math.abs(d[i+1]-sg)<tol && Math.abs(d[i+2]-sb)<tol)) continue;
    vis[pos]=1; d[i]=c.r; d[i+1]=c.g; d[i+2]=c.b; d[i+3]=255; cnt++;
    stk.push([x+1,y],[x-1,y],[x,y+1],[x,y-1]);
  }
  ctx.putImageData(id,0,0);
}

function hexRgb(h) {
  const m=/^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(h);
  return m ? {r:parseInt(m[1],16),g:parseInt(m[2],16),b:parseInt(m[3],16)} : null;
}

// History
function saveState() {
  historyStack.push(ctx.getImageData(0,0,drawingCanvas.width,drawingCanvas.height));
  if (historyStack.length > 30) historyStack.shift();
}
function undo() {
  if (historyStack.length > 1) {
    historyStack.pop();
    ctx.putImageData(historyStack[historyStack.length-1], 0, 0);
  }
}
function clearDrawing() {
  if (currentMode==='trace') startTrace(); else startColor();
}

// Save
function saveImage() {
  const link = document.createElement('a');
  link.download = 'coloring-' + Date.now() + '.png';
  link.href = drawingCanvas.toDataURL();
  link.click();
  showToast();
  celebrate();
}

function showToast() {
  const t = document.getElementById('save-toast');
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 2000);
}

function celebrate() {
  const el = document.getElementById('stars-celebration');
  el.innerHTML = '';
  el.classList.add('active');
  const emojis = ['⭐','🌟','✨','🎉','🎨','💫'];
  for (let i = 0; i < 20; i++) {
    const s = document.createElement('div');
    s.className = 'star-particle';
    s.textContent = emojis[Math.floor(Math.random()*emojis.length)];
    s.style.left = (Math.random()*100)+'%';
    s.style.top = '-5%';
    s.style.animationDelay = (Math.random()*0.8)+'s';
    s.style.fontSize = (24+Math.random()*24)+'px';
    el.appendChild(s);
  }
  setTimeout(() => el.classList.remove('active'), 2500);
}

// Resize
window.addEventListener('resize', () => {
  if (!document.getElementById('canvas-screen').classList.contains('active')) return;
  const saved = ctx.getImageData(0,0,drawingCanvas.width,drawingCanvas.height);
  drawingCanvas.width = window.innerWidth;
  drawingCanvas.height = window.innerHeight;
  ctx.fillStyle = '#fff'; ctx.fillRect(0,0,drawingCanvas.width,drawingCanvas.height);
  ctx.putImageData(saved, 0, 0);
  ctx.lineCap = 'round'; ctx.lineJoin = 'round';
});
</script>
